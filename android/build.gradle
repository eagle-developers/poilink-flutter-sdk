group 'com.poilink.sdk.flutter'
version '1.0.0'

buildscript {
    ext.kotlin_version = '1.9.10'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

def poilinkLocalRepo = "${project.projectDir}/repo"
rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url poilinkLocalRepo }
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace 'com.poilink.sdk.flutter'
    compileSdk 34

    defaultConfig {
        minSdk 26
        consumerProguardFiles 'consumer-rules.pro'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation 'com.poilink:sdk:1.1.0'
}
